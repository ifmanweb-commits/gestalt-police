version: '3.8'

services:
  vk-bot:
    build: .
    container_name: gestalt-police-bot
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      # Монтируем файлы данных для сохранения состояния между перезапусками
      - ./config.json:/app/config.json
      - ./custom_commands.json:/app/custom_commands.json
      - ./bot_database.json:/app/bot_database.json
      - ./experts.json:/app/experts.json
      - ./questions.json:/app/questions.json
      # Монтируем директорию для логов
      - ./logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge